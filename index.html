<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Solutions — Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            purple: { DEFAULT: '#6B2D8B', light: '#8B3DAB', dark: '#4A1F61', faint: '#F5EEFA' },
            green: { DEFAULT: '#8DC63F', dark: '#6EA030', faint: '#F2F9E8' },
            navy: { DEFAULT: '#1C2739', light: '#2A3850' },
            bg: '#F0F2F5',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            heading: ['Montserrat', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>

  <style>
    * { box-sizing: border-box; }
    body { background: #F0F2F5; font-family: 'Inter', system-ui, sans-serif; }

    /* ── Animations ── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes progressFill {
      from { width: 0%; }
      to   { width: var(--target-width); }
    }
    @keyframes strokeDash {
      from { stroke-dashoffset: 100; }
      to   { stroke-dashoffset: var(--target-dash); }
    }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(107,45,139,0.18); }
      50%       { box-shadow: 0 0 0 6px rgba(107,45,139,0.10); }
    }
    @keyframes bannerSlide {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bannerDismiss {
      from { opacity: 1; transform: translateY(0); max-height: 80px; }
      to   { opacity: 0; transform: translateY(-10px); max-height: 0; padding: 0; margin: 0; }
    }
    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.025); }
    }

    .nav-anim       { animation: fadeDown 0.45s ease-out both; }
    .hero-anim      { animation: fadeUp 0.5s 0.1s ease-out both; }
    .banner-anim    { animation: bannerSlide 0.4s 0.15s ease-out both; }
    .card-anim-1    { animation: fadeUp 0.45s 0.25s ease-out both; }
    .card-anim-2    { animation: fadeUp 0.45s 0.38s ease-out both; }
    .card-anim-3    { animation: fadeUp 0.45s 0.51s ease-out both; }
    .card-anim-4    { animation: fadeUp 0.45s 0.64s ease-out both; }
    .sidebar-anim-1 { animation: fadeIn 0.4s 0.55s ease-out both; }
    .sidebar-anim-2 { animation: fadeIn 0.4s 0.7s  ease-out both; }
    .sidebar-anim-3 { animation: fadeIn 0.4s 0.85s ease-out both; }
    .task-anim-1    { animation: fadeUp 0.4s 0.3s  ease-out both; }
    .task-anim-2    { animation: fadeUp 0.4s 0.42s ease-out both; }
    .task-anim-3    { animation: fadeUp 0.4s 0.54s ease-out both; }

    .priority-glow  { animation: pulse-glow 2.8s ease-in-out infinite; }

    .progress-bar   {
      animation: progressFill 1s 0.4s cubic-bezier(0.4,0,0.2,1) both;
    }

    /* Job card hover */
    .job-card {
      transition: transform 0.22s ease, box-shadow 0.22s ease;
    }
    .job-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(28,39,57,0.12);
    }
    .job-card .bookmark-icon {
      opacity: 0;
      transition: opacity 0.18s ease;
    }
    .job-card:hover .bookmark-icon {
      opacity: 1;
    }

    /* Button states */
    .btn-primary {
      transition: transform 0.15s ease, filter 0.15s ease;
    }
    .btn-primary:hover  { transform: scale(1.03); filter: brightness(1.08); }
    .btn-primary:active { transform: scale(0.97); }

    .btn-secondary {
      transition: background 0.18s ease, color 0.18s ease, border-color 0.18s ease;
    }
    .btn-secondary:hover {
      background: #6B2D8B !important;
      color: white !important;
      border-color: #6B2D8B !important;
    }

    /* Nav hover */
    .nav-link {
      position: relative;
      transition: color 0.18s ease;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0;
      width: 0; height: 2px;
      background: #6B2D8B;
      transition: width 0.2s ease;
      border-radius: 2px;
    }
    .nav-link:hover::after { width: 100%; }
    .nav-link:hover { color: #6B2D8B !important; }

    /* Contract badge hover */
    .badge-travel { transition: background 0.15s ease, color 0.15s ease; }
    .badge-travel:hover { background: #6B2D8B !important; color: white !important; }
    .badge-prn    { transition: background 0.15s ease, color 0.15s ease; }
    .badge-prn:hover { background: #8DC63F !important; color: white !important; }
    .badge-perm   { transition: background 0.15s ease, color 0.15s ease; }
    .badge-perm:hover { background: #1C2739 !important; color: white !important; }

    /* State toggle pill */
    .toggle-container { position: relative; }
    .toggle-pill {
      position: absolute;
      top: 3px; bottom: 3px;
      border-radius: 8px;
      background: white;
      box-shadow: 0 1px 4px rgba(0,0,0,0.14);
      transition: left 0.3s cubic-bezier(0.4,0,0.2,1), width 0.3s cubic-bezier(0.4,0,0.2,1);
      z-index: 1;
    }

    /* State transition */
    .state-content {
      animation: fadeIn 0.3s ease both;
    }

    /* Banner dismiss */
    .banner-dismissed {
      animation: bannerDismiss 0.35s ease-out forwards;
      overflow: hidden;
    }

    /* CTA pulse on first view */
    .cta-pulse { animation: gentlePulse 2.2s 1.2s ease-in-out 3; }

    /* Suggested question chips */
    .ai-chip {
      transition: background 0.15s ease, border-color 0.15s ease;
      cursor: pointer;
    }
    .ai-chip:hover { background: #F5EEFA; border-color: #6B2D8B; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useRef, useEffect } = React;

/* ── Icons (inline SVG) ── */
const IconSearch     = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>;
const IconChevronD   = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"/></svg>;
const IconPin        = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"/><circle cx="12" cy="10" r="3"/></svg>;
const IconClock      = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>;
const IconCalendar   = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
const IconHospital   = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>;
const IconDollar     = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>;
const IconBookmark   = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m19 21-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"/></svg>;
const IconArrowRight = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
const IconX          = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
const IconSparkle    = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 15l.75 2.25L22 18l-2.25.75L19 21l-.75-2.25L16 18l2.25-.75z"/></svg>;
const IconCheck      = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
const IconMessage    = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>;
const IconPhone      = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.45 2 2 0 0 1 3.59 1.27h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6 6l.9-.9a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 21.73 16z"/></svg>;
const IconMail       = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2-2-2z"/><polyline points="22,6 12,13 2,6"/></svg>;
const IconStar       = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>;
const IconInfo       = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>;
const IconTrending   = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>;

/* ── Circular progress ── */
function CircularProgress({ pct }) {
  const r = 20, circ = 2 * Math.PI * r;
  const offset = circ - (pct / 100) * circ;
  return (
    <svg width="52" height="52" viewBox="0 0 52 52" className="rotate-[-90deg]">
      <circle cx="26" cy="26" r={r} fill="none" stroke="#E9D8F5" strokeWidth="5"/>
      <circle
        cx="26" cy="26" r={r} fill="none"
        stroke="#6B2D8B" strokeWidth="5"
        strokeDasharray={circ}
        strokeDashoffset={offset}
        strokeLinecap="round"
        style={{ transition: 'stroke-dashoffset 1s 0.4s cubic-bezier(0.4,0,0.2,1)' }}
      />
    </svg>
  );
}

/* ── Contract type badge ── */
function Badge({ type }) {
  const styles = {
    TRAVEL:    'badge-travel bg-purple-faint text-purple border border-purple/20',
    PRN:       'badge-prn   bg-green-faint  text-green-dark border border-green/30',
    PERMANENT: 'badge-perm  bg-navy/8       text-navy border border-navy/15',
  };
  return (
    <span className={`inline-block px-2 py-0.5 rounded-md text-[10px] font-semibold tracking-wide uppercase ${styles[type] || styles.TRAVEL}`}>
      {type}
    </span>
  );
}

/* ── Job recommendation card ── */
function JobCard({ job, delay = 'card-anim-1' }) {
  const [saved, setSaved] = useState(false);
  return (
    <div className={`job-card bg-white rounded-2xl border border-gray-100 p-5 flex flex-col gap-3 relative ${delay}`}>
      {/* bookmark */}
      <button
        onClick={() => setSaved(s => !s)}
        className={`bookmark-icon absolute top-4 right-4 w-8 h-8 flex items-center justify-center rounded-lg transition-colors ${saved ? 'opacity-100 text-purple bg-purple-faint' : 'text-gray-400 hover:bg-gray-50'}`}
        title="Save job"
      >
        <IconBookmark />
      </button>

      {/* top */}
      <div className="flex items-start gap-2">
        <Badge type={job.type} />
      </div>

      {/* title */}
      <div>
        <h3 className="font-heading font-700 text-base text-navy leading-tight uppercase tracking-tight">{job.title}</h3>
        <p className="text-xs text-gray-400 mt-0.5 uppercase tracking-wider font-medium">{job.specialty}</p>
      </div>

      {/* pay — hero element */}
      <div>
        <span className="font-heading font-800 text-2xl text-purple">{job.payPrimary}</span>
        {job.paySecondary && <span className="text-gray-400 text-sm font-medium">–{job.paySecondary}</span>}
        <p className="text-xs text-gray-400 mt-0.5">{job.payLabel}</p>
      </div>

      {/* meta */}
      <div className="flex flex-col gap-1.5 text-xs text-gray-500">
        <span className="flex items-center gap-1.5 font-medium text-navy/80"><IconPin />{job.location}</span>
        <span className="flex items-center gap-1.5"><IconClock />{job.schedule}</span>
        <span className="flex items-center gap-1.5"><IconCalendar />{job.startDate}</span>
        <span className="flex items-center gap-1.5"><IconHospital />{job.facility}</span>
      </div>

      {/* why rec */}
      <div className="flex items-start gap-1.5 bg-green-faint border border-green/20 rounded-lg px-3 py-2 text-xs text-green-dark">
        <span className="mt-0.5 shrink-0"><IconTrending /></span>
        <span>{job.whyRec}</span>
      </div>

      {/* CTA */}
      <button className="btn-primary cta-pulse mt-auto w-full bg-purple text-white rounded-xl py-2.5 text-sm font-semibold flex items-center justify-center gap-2">
        View & Apply <IconArrowRight />
      </button>
    </div>
  );
}

/* ── Progress bar ── */
function ProgressBar({ pct, className = '' }) {
  return (
    <div className={`h-2 bg-gray-100 rounded-full overflow-hidden ${className}`}>
      <div
        className="h-full bg-purple rounded-full progress-bar"
        style={{ '--target-width': `${pct}%`, width: `${pct}%` }}
      />
    </div>
  );
}

/* ── State A: Job seeker ── */
function StateA() {
  return (
    <div className="state-content flex flex-col gap-6">

      {/* Applied ribbon */}
      <div className="bg-navy rounded-2xl px-6 py-4 flex items-center gap-4 flex-wrap banner-anim">
        <div className="flex items-center gap-3 flex-1 min-w-0">
          <span className="shrink-0 px-2 py-0.5 bg-green text-white text-[10px] font-semibold uppercase tracking-wider rounded-md">
            You Applied
          </span>
          <div className="min-w-0">
            <p className="font-heading font-700 text-white text-sm truncate">Travel RN — Telemetry / PCU</p>
            <p className="text-gray-400 text-xs mt-0.5 truncate">Abbott Northwestern Hospital · Minneapolis, MN</p>
          </div>
        </div>
        <div className="flex items-center gap-5 text-xs text-gray-300 shrink-0 flex-wrap gap-y-1">
          <span className="flex items-center gap-1.5"><IconDollar />$2,418–$2,750/wk</span>
          <span className="flex items-center gap-1.5"><IconClock />3×12 Nights · 13 weeks</span>
          <span className="flex items-center gap-1.5"><IconCalendar />Starts Apr 7, 2026</span>
        </div>
      </div>

      {/* Profile completion */}
      <div className="bg-white rounded-2xl border border-gray-100 p-6 hero-anim">
        <div className="flex items-start justify-between gap-4 mb-5">
          <div>
            <h2 className="font-heading font-700 text-lg text-navy">Complete to get submitted</h2>
            <p className="text-sm text-gray-500 mt-0.5">Finish these steps and we'll submit you to Abbott within the hour.</p>
          </div>
          <div className="shrink-0 flex flex-col items-center gap-1">
            <div className="relative w-[52px] h-[52px]">
              <CircularProgress pct={40} />
              <span className="absolute inset-0 flex items-center justify-center font-heading font-700 text-sm text-purple">40%</span>
            </div>
            <div className="text-center">
              <p className="font-semibold text-xs text-navy">40% complete</p>
              <p className="text-[10px] text-gray-400">Est. 15 min remaining</p>
            </div>
          </div>
        </div>

        {/* Task 1 — priority */}
        <div className="task-anim-1 priority-glow border-2 border-purple/40 rounded-2xl p-4 mb-3 bg-purple-faint/40">
          <div className="flex items-start gap-4">
            <div className="w-8 h-8 rounded-full bg-purple text-white flex items-center justify-center font-heading font-700 text-sm shrink-0 mt-0.5">1</div>
            <div className="flex-1 min-w-0">
              <div className="flex items-center gap-2 flex-wrap">
                <h3 className="font-heading font-700 text-sm text-navy">Full Application</h3>
                <span className="px-2 py-0.5 bg-green text-white text-[10px] font-semibold uppercase tracking-wider rounded-md">#1 Priority</span>
              </div>
              <p className="text-xs text-gray-500 mt-0.5">Employment history, credentials, and license verification</p>
              <ProgressBar pct={40} className="mt-3 mb-1" />
              <div className="flex items-center justify-between text-xs">
                <span className="text-purple font-medium">40% complete · Personal info done</span>
                <span className="text-gray-400">Credentials &amp; license next</span>
              </div>
            </div>
            <button className="btn-primary bg-purple text-white rounded-xl px-4 py-2 text-sm font-semibold flex items-center gap-1.5 shrink-0 whitespace-nowrap">
              Continue <IconArrowRight />
            </button>
          </div>
        </div>

        {/* Task 2 */}
        <div className="task-anim-2 border border-gray-100 rounded-2xl p-4 mb-3 bg-white hover:border-purple/20 transition-colors">
          <div className="flex items-center gap-4">
            <div className="w-8 h-8 rounded-full border-2 border-gray-200 text-gray-400 flex items-center justify-center font-heading font-700 text-sm shrink-0">2</div>
            <div className="flex-1 min-w-0">
              <h3 className="font-heading font-700 text-sm text-navy">Professional References</h3>
              <p className="text-xs text-gray-500 mt-0.5">2 of 3 added · Add 1 more clinical supervisor or charge nurse</p>
            </div>
            <button className="btn-secondary border border-purple/40 text-purple rounded-xl px-4 py-2 text-sm font-semibold flex items-center gap-1.5 shrink-0">
              Add <IconArrowRight />
            </button>
          </div>
        </div>

        {/* Task 3 */}
        <div className="task-anim-3 border border-gray-100 rounded-2xl p-4 bg-white hover:border-purple/20 transition-colors">
          <div className="flex items-center gap-4">
            <div className="w-8 h-8 rounded-full border-2 border-gray-200 text-gray-400 flex items-center justify-center font-heading font-700 text-sm shrink-0">3</div>
            <div className="flex-1 min-w-0">
              <h3 className="font-heading font-700 text-sm text-navy">Skills Checklist</h3>
              <p className="text-xs text-gray-500 mt-0.5">Self-assess your Telemetry competencies · Takes ~10 min</p>
            </div>
            <button className="btn-secondary border border-gray-200 text-gray-500 rounded-xl px-4 py-2 text-sm font-semibold flex items-center gap-1.5 shrink-0">
              Start <IconArrowRight />
            </button>
          </div>
        </div>
      </div>

      {/* Job recommendations */}
      <JobsSection
        heading="More jobs like this"
        subheading="Roles that match your Telemetry background · Minnesota &amp; nearby"
      />

      {/* Auto-submit strip */}
      <div className="bg-white rounded-2xl border border-gray-100 px-5 py-4 flex items-center gap-4 card-anim-4">
        <div className="w-8 h-8 rounded-full bg-green-faint border border-green/30 flex items-center justify-center text-green-dark shrink-0">
          <IconCheck />
        </div>
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2">
            <span className="font-semibold text-sm text-navy">Auto Submit</span>
            <span className="px-1.5 py-0.5 bg-purple-faint text-purple text-[10px] font-semibold uppercase tracking-wider rounded-md">New</span>
          </div>

/* ── State toggle ── */
function StateToggle({ state, onChange }) {
  const aRef = useRef(null);
  const bRef = useRef(null);
  const [pillStyle, setPillStyle] = useState({ left: 3, width: 0 });

  useEffect(() => {
    const el = state === 'A' ? aRef.current : bRef.current;
    if (el) {
      const parent = el.closest('.toggle-container');
      const pr = parent.getBoundingClientRect();
      const er = el.getBoundingClientRect();
      setPillStyle({ left: er.left - pr.left, width: er.width });
    }
  }, [state]);

  return (
    <div className="toggle-container relative bg-gray-100 rounded-xl p-[3px] inline-flex">
      <div className="toggle-pill" style={{ left: pillStyle.left, width: pillStyle.width }} />
      <button
        ref={aRef}
        onClick={() => onChange('A')}
        className={`relative z-10 px-4 py-2 rounded-[9px] text-xs font-semibold transition-colors ${state === 'A' ? 'text-navy' : 'text-gray-500'}`}
      >
        On assignment
      </button>
      <button
        ref={bRef}
        onClick={() => onChange('B')}
        className={`relative z-10 px-4 py-2 rounded-[9px] text-xs font-semibold transition-colors ${state === 'B' ? 'text-navy' : 'text-gray-500'}`}
      >
        New signup
      </button>
    </div>
  );
}
